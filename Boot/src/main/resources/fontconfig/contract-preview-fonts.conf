<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
	<description>Chinese font aliases used by contract Office previews</description>

	<!-- Linux deployment font directories. -->
	<dir>/usr/share/fonts</dir>
	<dir>/usr/local/share/fonts</dir>
	<dir>/usr/local/texlive/2024/texmf-dist/fonts/opentype/public/fandol</dir>
	<dir>~/.local/share/fonts</dir>
	<dir>~/.fonts</dir>

	<!-- macOS development font directories. -->
	<dir>/System/Library/Fonts</dir>
	<dir>/System/Library/Fonts/Supplemental</dir>
	<dir>/Library/Fonts</dir>
	<dir>~/Library/Fonts</dir>

	<alias binding="strong">
		<family>仿宋</family>
		<prefer>
			<family>FangSong</family>
			<family>PingFang SC</family>
			<family>Noto Sans CJK SC</family>
			<family>Source Han Sans SC</family>
			<family>FandolFang</family>
			<family>STSong</family>
			<family>Songti SC</family>
			<family>Noto Serif CJK SC</family>
			<family>Source Han Serif SC</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>宋体</family>
		<prefer>
			<family>SimSun</family>
			<family>PingFang SC</family>
			<family>Noto Sans CJK SC</family>
			<family>Source Han Sans SC</family>
			<family>FandolSong</family>
			<family>STSong</family>
			<family>Songti SC</family>
			<family>Noto Serif CJK SC</family>
			<family>Source Han Serif SC</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>楷体</family>
		<prefer>
			<family>KaiTi</family>
			<family>PingFang SC</family>
			<family>Noto Sans CJK SC</family>
			<family>Source Han Sans SC</family>
			<family>FandolKai</family>
			<family>STSong</family>
			<family>Songti SC</family>
			<family>Noto Serif CJK SC</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>黑体</family>
		<prefer>
			<family>SimHei</family>
			<family>PingFang SC</family>
			<family>Noto Sans CJK SC</family>
			<family>Source Han Sans SC</family>
			<family>FandolHei</family>
			<family>Heiti SC</family>
			<family>PingFang SC</family>
			<family>Noto Sans CJK SC</family>
			<family>Source Han Sans SC</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>微软雅黑</family>
		<prefer>
			<family>Microsoft YaHei</family>
			<family>PingFang SC</family>
			<family>Heiti SC</family>
			<family>Noto Sans CJK SC</family>
			<family>Source Han Sans SC</family>
		</prefer>
	</alias>

	<cachedir prefix="xdg">fontconfig</cachedir>
	<cachedir>~/.cache/fontconfig</cachedir>
	<config>
		<rescan>
			<int>30</int>
		</rescan>
	</config>
</fontconfig>
